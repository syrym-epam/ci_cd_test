name: CI for project 

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  hello-world:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./

    - name: Say hello
      run: echo "Hello, Github Action! This is my first workflow!"

    - name: Show date
      run: date

    - name: Secret value
    - run: echo "${{secret.REP_MESSAGE}}"
